<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYS Style - HomePulse</title>
    <style>
        :root {
            --primary-font: 'Helvetica Neue', Arial, sans-serif;
            --text-light: #ffffff;
            --text-dark: #111111;
            --accent-gray: #777777;
            --glass-bg: rgba(0, 0, 0, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--primary-font);
            direction: rtl;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* ========================================================= */
        /* 🏙️ רקע תמונות מתחלפות (אפקט אדריכלי יוקרתי)                  */
        /* ========================================================= */
        .background-slider {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: imageFade 18s infinite ease-in-out;
        }

        /* 3 תמונות ארכיטקטורה מודרניות מבוססות Unsplash בקוד פתוח */
        .slide:nth-child(1) {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?q=80&w=1920');
            animation-delay: 0s;
        }
        .slide:nth-child(2) {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1920');
            animation-delay: 6s;
        }
        .slide:nth-child(3) {
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1920');
            animation-delay: 12s;
        }

        @keyframes imageFade {
            0% { opacity: 0; transform: scale(1.05); }
            8% { opacity: 1; }
            33% { opacity: 1; }
            41% { opacity: 0; transform: scale(1); }
            100% { opacity: 0; }
        }

        /* ========================================================= */
        /* 📐 מבנה העמוד והגריד (מינימליזם אחיד)                        */
        /* ========================================================= */
        .main-layout {
            position: relative;
            z-index: 10;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 450px; /* חלוקה אירופאית: מסך גדול ותפריט צף בצד */
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar-panel { display: none; } /* מובייל יראה את ה-Hero בלבד עם מודל */
        }

        /* צד ימין: כותרות גדולה, לוגו דק ואווירה */
        .hero-panel {
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: var(--text-light);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 200; /* דק במיוחד */
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .logo span { font-weight: 600; color: #fff; }

        .hero-title-area h1 {
            font-size: 3.5rem;
            font-weight: 200;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }
        .hero-title-area p {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
            max-width: 500px;
        }

        /* צד שמאל: פאנל כניסה מונוכרומטי אלגנטי */
        .sidebar-panel {
            background-color: rgba(255, 255, 255, 0.96);
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        }

        .panel-header {
            margin-bottom: 3rem;
        }
        .panel-header h2 {
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        /* טפסים בסגנון פרימיום נקי */
        .form-group {
            margin-bottom: 1.8rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-gray);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 0.9rem 0;
            border: none;
            border-bottom: 1px solid #cccccc; /* רק קו תחתון, בלי מסגרת מעיקה */
            background: transparent;
            font-size: 1rem;
            color: var(--text-dark);
            transition: border-color 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-bottom-color: var(--text-dark);
        }

        /* כפתור ארכיטקטורה שטוח וחד */
        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            background-color: var(--text-dark);
            color: var(--text-light);
            border: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s ease;
            margin-top: 1rem;
        }
        .btn-submit:hover {
            background-color: #333333;
        }

        .switch-auth {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--accent-gray);
        }
        .switch-auth a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--text-dark);
        }
    </style>
</head>
<body>

    <!-- שכבת התמונות המתחלפות אוטומטית ברקע -->
    <div class="background-slider">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>

    <!-- הגריד המרכזי של האתר -->
    <div class="main-layout">
        
        <!-- חצי ימני: Hero & Logo -->
        <div class="hero-panel">
            <div class="logo">HOMEPULSE <span>/ ARCH</span></div>
            
            <div class="hero-title-area">
                <h1>אדריכלות ניהול<br>מתקדמת.</h1>
                <p>מערכת סינכרון דיגיטלית למגדלי יוקרה וקהילות מגורים מודרניות. שקיפות, שירותיות ויופי פונקציונלי בבניין שלך.</p>
            </div>
            
            <div style="font-size: 0.8rem; color: rgba(255,255,255,0.4); letter-spacing: 1px;">
                © 2026 HOMEPULSE DIGITAL EXPERIENCE. ALL RIGHTS RESERVED.
            </div>
        </div>

        <!-- חצי שמאלי: טופס כניסה מוקפד, שקט ואירופאי -->
        <div class="sidebar-panel">
            <div class="panel-header">
                <h2>התחברות לדאשבורד</h2>
            </div>

            <!-- מוכן לחיבור לשרת (שדות אינפוט עם מזהים מדויקים) -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">דואר אלקטרוני</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">סיסמת גישה</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">כניסת דיירים</button>
            </form>

            <div class="switch-auth">
                מגדל חדש בפלטפורמה? <a href="#">רישום בניין</a>
            </div>
        </div>

    </div>

</body>
</html>
